name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Install backend dependencies
        run: yarn install --frozen-lockfile
        working-directory: backend
      - name: Run backend tests
        run: yarn test
        working-directory: backend

  frontend-test:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build shared remote
        run: yarn workspace shared build
      - name: Run frontend tests
        run: yarn workspace frontend test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build shared remote
        run: yarn workspace shared build
      - name: Build frontend
        run: yarn workspace frontend build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Start shared remote server
        run: yarn workspace shared preview &
      - name: Wait for shared remote
        run: npx wait-on http://localhost:5174/remoteEntry.js --timeout 10000
      - name: Run E2E tests
        run: yarn workspace frontend e2e

  deploy:
    name: Deploy (Render + Vercel)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, e2e]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Trigger Render deploy (backend)
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set, skipping Render deploy"
          fi
      - name: Trigger Vercel deploy (frontend)
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            curl -f -sS "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
          else
            echo "VERCEL_DEPLOY_HOOK_URL not set, skipping Vercel deploy"
          fi
